version: "3.8"

services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: hermescraft-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.1"
      ONLINE_MODE: "FALSE"
      DIFFICULTY: "normal"
      GAMEMODE: "survival"
      MAX_PLAYERS: 10
      VIEW_DISTANCE: 12
      SPAWN_PROTECTION: 0
      ALLOW_NETHER: "true"
      GENERATE_STRUCTURES: "true"
      # Fresh world every time container is recreated with --force-recreate
      LEVEL: "world"
      MOTD: "HermesCraft — Luna & Max"
      # Performance
      MEMORY: "4G"
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
      # Spawn in plains for easy building
      LEVEL_TYPE: "DEFAULT"
    volumes:
      - ./server-data:/data
    restart: unless-stopped
    stdin_open: true
    tty: true
